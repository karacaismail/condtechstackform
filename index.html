<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meta-Framework Karar Sihirbazı — Koşullu Form → Kanban</title>

<!-- Roboto (kullanıcı kuralı: min weight 300) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />

<!-- Phosphor Icons (kullanıcı kuralı: phosphor öncelik) -->
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

<!-- Tailwind + Flowbite -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />

<style>
/* SCSS-derlenmiş gibi düşünülecek CSS — Roboto, 1rem taban, custom pill renkleri */
:root {
  --ff-base: 'Roboto', system-ui, sans-serif;
  --fs-base: 1rem;          /* MIN 1rem — kullanıcı kuralı */
  --fs-sm:   1rem;          /* min 1rem korunur, sm farkı sadece weight ile */
  --fs-lg:   1.125rem;
  --fs-xl:   1.375rem;
  --fs-2xl:  1.75rem;
  --fs-3xl:  2.25rem;
  --fw-light: 300;
  --fw-reg:   400;
  --fw-med:   500;
  --fw-bold:  700;

  --c-bg:           #f8fafc;
  --c-surface:      #ffffff;
  --c-border:       #e2e8f0;
  --c-text:         #0f172a;
  --c-text-muted:   #475569;
  --c-primary:      #4f46e5;
  --c-primary-soft: #eef2ff;
  --c-success:      #059669;
  --c-warning:      #d97706;
  --c-danger:       #dc2626;

  /* Sütun renk tokenları (Kanban kategorileri) */
  --col-kernel:     #7c3aed;  /* mor — DDD kernel */
  --col-stack:      #dc2626;  /* kırmızı — tahtadaki tech stack rengi */
  --col-saas:       #059669;  /* yeşil — saas apps */
  --col-module:     #2563eb;  /* mavi — system modules */
  --col-plugin:     #ea580c;  /* turuncu — plugins */
  --col-extension:  #0891b2;  /* cyan — extensions/snippets */
  --col-paradigm:   #be185d;  /* fuşya — mimari paradigmalar */

  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 14px;
  --shadow-1: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
  --shadow-2: 0 4px 12px rgba(15,23,42,.06), 0 2px 4px rgba(15,23,42,.04);
}

* { box-sizing: border-box; }
html, body {
  font-family: var(--ff-base);
  font-size: var(--fs-base);
  font-weight: var(--fw-reg);
  color: var(--c-text);
  background: var(--c-bg);
  margin: 0;
}
/* Tailwind body resetini kullanıcı kuralıyla geçersiz kıl */
body { font-size: 1rem !important; line-height: 1.55; }

/* Hiçbir öğe 1rem altına düşmesin */
.pill, .meta, .hint, .step-num, button, input, label, small, .text-xs, .text-sm {
  font-size: 1rem !important;
}

/* Düzen */
.shell {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 4rem;
}
.topbar {
  display: flex; gap: 1rem; align-items: center; justify-content: space-between;
  padding: 1rem 1.25rem;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
  margin-bottom: 1.5rem;
}
.brand {
  display: flex; align-items: center; gap: .75rem;
  font-weight: var(--fw-med);
  font-size: var(--fs-lg);
}
.brand i { color: var(--c-primary); font-size: 1.75rem; }

/* İlerleme barı */
.progress {
  display: flex; gap: .5rem; flex-wrap: wrap; align-items: center;
}
.progress .dot {
  width: 1.5rem; height: 1.5rem; border-radius: 50%;
  border: 2px solid var(--c-border);
  background: var(--c-surface);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: .85rem !important;   /* sadece dot içi — istisna */
  color: var(--c-text-muted);
  font-weight: var(--fw-med);
}
.progress .dot.done { background: var(--c-primary); border-color: var(--c-primary); color: #fff; }
.progress .dot.current { border-color: var(--c-primary); color: var(--c-primary); font-weight: var(--fw-bold); }

.layout {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.4fr);
  gap: 1.5rem;
}
@media (max-width: 1100px) {
  .layout { grid-template-columns: 1fr; }
}

/* Form Kartı */
.card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
  padding: 1.5rem;
}
.card-header {
  margin-bottom: 1.25rem;
  display: flex; gap: 1rem; align-items: flex-start; justify-content: space-between;
}
.card-header h2 {
  margin: 0 0 .25rem 0;
  font-size: var(--fs-xl);
  font-weight: var(--fw-med);
  color: var(--c-text);
}
.card-header p {
  margin: 0;
  color: var(--c-text-muted);
  font-weight: var(--fw-light);
}
.step-num {
  background: var(--c-primary-soft);
  color: var(--c-primary);
  padding: .35rem .65rem;
  border-radius: 999px;
  font-weight: var(--fw-med);
  white-space: nowrap;
}

/* Option grid (multi-conditional form alanları) */
.options {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: .75rem;
}
.option {
  border: 1.5px solid var(--c-border);
  background: #fff;
  padding: 1rem 1.1rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .15s ease;
  display: flex; flex-direction: column; gap: .55rem;
  text-align: left;
  font: inherit;
}
.option:hover { border-color: var(--c-primary); box-shadow: var(--shadow-2); transform: translateY(-1px); }
.option.selected {
  border-color: var(--c-primary);
  background: var(--c-primary-soft);
  outline: 3px solid rgba(79,70,229,.12);
}
.option-head {
  display: flex; align-items: center; gap: .55rem;
  font-weight: var(--fw-med);
}
.option-head i { font-size: 1.4rem; color: var(--c-primary); }
.option-desc { color: var(--c-text-muted); font-weight: var(--fw-light); }
.option-pills { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .25rem; }

/* Pill / Tag / Balloon — gerekçe baloncukları */
.pill {
  display: inline-flex; align-items: center; gap: .3rem;
  padding: .25rem .6rem;
  border-radius: 999px;
  font-weight: var(--fw-med);
  background: #f1f5f9;
  color: #334155;
  border: 1px solid #e2e8f0;
  white-space: nowrap;
}
.pill i { font-size: 1.05rem; }
.pill.pill-why    { background: #fef3c7; color: #92400e; border-color: #fde68a; }
.pill.pill-must   { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
.pill.pill-should { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
.pill.pill-could  { background: #e0f2fe; color: #075985; border-color: #bae6fd; }
.pill.pill-effort { background: #ecfccb; color: #3f6212; border-color: #d9f99d; }
.pill.pill-license{ background: #f3e8ff; color: #6b21a8; border-color: #e9d5ff; }
.pill.pill-paradigm{ background: #fce7f3; color: #9d174d; border-color: #fbcfe8; }

/* Form altı navigasyon */
.nav-row {
  display: flex; gap: .75rem; justify-content: space-between;
  margin-top: 1.25rem;
}
.btn {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .65rem 1.1rem;
  border-radius: var(--radius);
  border: 1.5px solid var(--c-border);
  background: #fff;
  color: var(--c-text);
  cursor: pointer;
  font: inherit;
  font-weight: var(--fw-med);
  transition: all .15s ease;
}
.btn:hover { border-color: var(--c-primary); color: var(--c-primary); }
.btn-primary { background: var(--c-primary); border-color: var(--c-primary); color: #fff; }
.btn-primary:hover { background: #4338ca; border-color: #4338ca; color: #fff; }
.btn-ghost   { border-color: transparent; }
.btn[disabled] { opacity: .4; cursor: not-allowed; }

/* Kanban Önizleme / Sonuç */
.kanban {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
  padding: 1.25rem;
  height: fit-content;
  position: sticky;
  top: 1rem;
}
.kanban-head {
  display: flex; align-items: center; gap: .65rem;
  margin-bottom: 1rem;
}
.kanban-head h3 { margin: 0; font-weight: var(--fw-med); font-size: var(--fs-lg); }
.kanban-head .meta { color: var(--c-text-muted); font-weight: var(--fw-light); margin-left: auto; }
.kanban-board {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: .75rem;
}
.column {
  background: #f8fafc;
  border-radius: var(--radius);
  padding: .75rem;
  border-top: 4px solid var(--col-kernel);
  min-height: 120px;
}
.column[data-col="kernel"]    { border-top-color: var(--col-kernel); }
.column[data-col="stack"]     { border-top-color: var(--col-stack); }
.column[data-col="saas"]      { border-top-color: var(--col-saas); }
.column[data-col="module"]    { border-top-color: var(--col-module); }
.column[data-col="plugin"]    { border-top-color: var(--col-plugin); }
.column[data-col="extension"] { border-top-color: var(--col-extension); }
.column[data-col="paradigm"]  { border-top-color: var(--col-paradigm); }

.column-head {
  display: flex; align-items: center; gap: .45rem;
  margin-bottom: .65rem;
  font-weight: var(--fw-med);
}
.column-head .count {
  margin-left: auto;
  background: #fff; color: var(--c-text-muted);
  padding: 0 .55rem; border-radius: 999px;
  border: 1px solid var(--c-border);
}
.col-icon { width: 1.5rem; height: 1.5rem; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; color: #fff; }
.column[data-col="kernel"]    .col-icon { background: var(--col-kernel); }
.column[data-col="stack"]     .col-icon { background: var(--col-stack); }
.column[data-col="saas"]      .col-icon { background: var(--col-saas); }
.column[data-col="module"]    .col-icon { background: var(--col-module); }
.column[data-col="plugin"]    .col-icon { background: var(--col-plugin); }
.column[data-col="extension"] .col-icon { background: var(--col-extension); }
.column[data-col="paradigm"]  .col-icon { background: var(--col-paradigm); }

.kcard {
  background: #fff;
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  padding: .65rem .75rem;
  display: flex; flex-direction: column; gap: .4rem;
  margin-bottom: .5rem;
  box-shadow: var(--shadow-1);
}
.kcard-title { display: flex; align-items: center; gap: .4rem; font-weight: var(--fw-med); }
.kcard-title i { color: var(--c-primary); }
.kcard-desc { color: var(--c-text-muted); font-weight: var(--fw-light); }
.kcard-pills { display: flex; flex-wrap: wrap; gap: .25rem; }
.empty {
  text-align: center; color: var(--c-text-muted); font-weight: var(--fw-light);
  padding: .65rem; border: 1.5px dashed var(--c-border); border-radius: var(--radius-sm);
  background: #fff;
}

/* Final Mode */
.final-banner {
  background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
  color: #fff;
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 1rem;
}
.final-banner i { font-size: 2.5rem; }
.final-banner h2 { margin: 0; font-weight: var(--fw-med); font-size: var(--fs-2xl); }
.final-banner p { margin: 0; font-weight: var(--fw-light); opacity: .92; }

/* Cevap özeti */
.summary {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}
.summary-row { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; padding: .25rem 0; }
.summary-row strong { font-weight: var(--fw-med); min-width: 12rem; }

/* Tooltip (gerekçe baloncuğu) */
[data-tip] { position: relative; cursor: help; }
[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + .35rem); left: 50%;
  transform: translateX(-50%);
  background: #0f172a; color: #fff;
  padding: .5rem .75rem; border-radius: 6px;
  white-space: pre-wrap; max-width: 280px; width: max-content;
  font-weight: var(--fw-light);
  z-index: 50;
  box-shadow: var(--shadow-2);
}

/* AI Explain bölümü */
.ai-box {
  background: #f0f9ff;
  border: 1px solid #bae6fd;
  border-radius: var(--radius);
  padding: .85rem 1rem;
  margin-top: 1rem;
  font-weight: var(--fw-light);
  display: none;
}
.ai-box.show { display: block; }
.ai-box .ai-head { display: flex; align-items: center; gap: .5rem; font-weight: var(--fw-med); margin-bottom: .35rem; color: #0369a1; }

/* ============================================================
   Senaryo Kartları (Flowbite + custom — JSON content, modal trigger)
   ============================================================ */
#scenarios-section {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
  padding: 1.25rem 1.5rem 1.5rem;
  margin-bottom: 1.5rem;
}
.scenarios-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; gap: 1rem; flex-wrap: wrap; }
.scenarios-head h3 { margin: 0 0 .25rem 0; display: flex; align-items: center; gap: .55rem; font-size: var(--fs-lg); font-weight: var(--fw-med); }
.scenarios-head h3 i { color: var(--c-primary); font-size: 1.5rem; }
.scenarios-head p { margin: 0; color: var(--c-text-muted); font-weight: var(--fw-light); }
.scenarios-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: .85rem;
}
.scenario-card {
  text-align: left;
  background: #fff;
  border: 1.5px solid var(--c-border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.1rem 1.1rem;
  cursor: pointer;
  display: flex; flex-direction: column; gap: .55rem;
  transition: all .18s ease;
  font: inherit;
  position: relative;
  overflow: hidden;
}
.scenario-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--c-primary);
}
.scenario-card:hover { border-color: var(--c-primary); transform: translateY(-2px); box-shadow: var(--shadow-2); }
.scenario-card.scenario-purple::before { background: #7c3aed; }
.scenario-card.scenario-teal::before   { background: #0d9488; }
.scenario-card.scenario-coral::before  { background: #ea580c; }
.scenario-card.scenario-pink::before   { background: #db2777; }
.scenario-card.scenario-blue::before   { background: #2563eb; }
.scenario-card.scenario-green::before  { background: #16a34a; }
.scenario-card.scenario-amber::before  { background: #d97706; }
.scenario-card.scenario-gray::before   { background: #64748b; }
.scenario-icon { font-size: 2rem; line-height: 1; color: var(--c-primary); }
.scenario-card.scenario-purple .scenario-icon { color: #7c3aed; }
.scenario-card.scenario-teal   .scenario-icon { color: #0d9488; }
.scenario-card.scenario-coral  .scenario-icon { color: #ea580c; }
.scenario-card.scenario-pink   .scenario-icon { color: #db2777; }
.scenario-card.scenario-blue   .scenario-icon { color: #2563eb; }
.scenario-card.scenario-green  .scenario-icon { color: #16a34a; }
.scenario-card.scenario-amber  .scenario-icon { color: #d97706; }
.scenario-card.scenario-gray   .scenario-icon { color: #64748b; }
.scenario-meta { display: flex; gap: .35rem; flex-wrap: wrap; }
.scenario-badge {
  display: inline-flex; align-items: center; padding: .15rem .6rem; border-radius: 999px;
  font-weight: var(--fw-med); font-size: 1rem !important;
  background: #f1f5f9; color: #334155; border: 1px solid #e2e8f0;
}
.scenario-card.scenario-purple .scenario-badge { background:#f3e8ff; color:#6b21a8; border-color:#e9d5ff; }
.scenario-card.scenario-teal   .scenario-badge { background:#ccfbf1; color:#115e59; border-color:#99f6e4; }
.scenario-card.scenario-coral  .scenario-badge { background:#fff7ed; color:#9a3412; border-color:#fed7aa; }
.scenario-card.scenario-pink   .scenario-badge { background:#fce7f3; color:#9d174d; border-color:#fbcfe8; }
.scenario-card.scenario-blue   .scenario-badge { background:#dbeafe; color:#1e40af; border-color:#bfdbfe; }
.scenario-card.scenario-green  .scenario-badge { background:#dcfce7; color:#166534; border-color:#bbf7d0; }
.scenario-card.scenario-amber  .scenario-badge { background:#fef3c7; color:#92400e; border-color:#fde68a; }
.scenario-card.scenario-gray   .scenario-badge { background:#f1f5f9; color:#475569; border-color:#cbd5e1; }
.scenario-title { font-weight: var(--fw-med); font-size: var(--fs-lg); }
.scenario-summary { color: var(--c-text-muted); font-weight: var(--fw-light); }
.scenario-cta { display: inline-flex; align-items: center; gap: .35rem; color: var(--c-primary); font-weight: var(--fw-med); margin-top: .35rem; }

/* ============================================================
   Modal (Flowbite-uyumlu custom)
   ============================================================ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, .55);
  display: none;
  align-items: flex-start;
  justify-content: center;
  z-index: 100;
  padding: 2rem 1rem;
  overflow-y: auto;
}
.modal-backdrop.show { display: flex; }
.modal-content {
  background: var(--c-surface);
  border-radius: var(--radius-lg);
  max-width: 760px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(15, 23, 42, .25);
  padding: 0;
  margin: auto;
  animation: modalIn .2s ease-out;
}
@keyframes modalIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.modal-head {
  display: flex; gap: 1rem; align-items: flex-start;
  padding: 1.5rem 1.75rem 1.25rem;
  border-bottom: 1px solid var(--c-border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.modal-head-icon { font-size: 3rem; line-height: 1; }
.modal-head.scenario-purple .modal-head-icon { color: #7c3aed; }
.modal-head.scenario-teal   .modal-head-icon { color: #0d9488; }
.modal-head.scenario-coral  .modal-head-icon { color: #ea580c; }
.modal-head.scenario-pink   .modal-head-icon { color: #db2777; }
.modal-head.scenario-blue   .modal-head-icon { color: #2563eb; }
.modal-head.scenario-green  .modal-head-icon { color: #16a34a; }
.modal-head.scenario-amber  .modal-head-icon { color: #d97706; }
.modal-head.scenario-gray   .modal-head-icon { color: #64748b; }
.modal-head-text { flex: 1; min-width: 0; }
.modal-head-text h2 { margin: .4rem 0 .3rem; font-size: var(--fs-2xl); font-weight: var(--fw-med); }
.modal-head-text p  { margin: 0; color: var(--c-text-muted); font-weight: var(--fw-light); }

.modal-section { padding: 1.1rem 1.75rem; border-bottom: 1px solid var(--c-border); }
.modal-section:last-of-type { border-bottom: none; }
.modal-section h3 {
  margin: 0 0 .8rem; font-size: var(--fs-lg); font-weight: var(--fw-med);
  display: flex; align-items: center; gap: .5rem;
}
.modal-section h3 i { color: var(--c-primary); font-size: 1.4rem; }

.modal-profile { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: .6rem; }
.modal-profile > div { background: #f8fafc; border: 1px solid var(--c-border); border-radius: var(--radius); padding: .6rem .85rem; display: flex; flex-direction: column; gap: .15rem; }
.modal-profile span { color: var(--c-text-muted); font-weight: var(--fw-light); }
.modal-profile strong { font-weight: var(--fw-med); }

.modal-answers { display: flex; flex-direction: column; gap: .35rem; }
.modal-answer {
  display: flex; align-items: center; gap: .65rem;
  padding: .45rem .65rem; border-radius: var(--radius);
  background: #f8fafc; border: 1px solid var(--c-border);
  flex-wrap: wrap;
}
.modal-answer-q { font-weight: var(--fw-med); min-width: 12rem; flex: 1; }

.modal-rationales { display: flex; flex-direction: column; gap: .85rem; }
.modal-rationale h4 { margin: 0 0 .25rem; font-size: var(--fs-base); font-weight: var(--fw-med); color: var(--c-primary); }
.modal-rationale p { margin: 0; color: var(--c-text); font-weight: var(--fw-light); line-height: 1.6; }

.modal-pitfalls { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: .4rem; }
.modal-pitfalls li {
  display: flex; align-items: flex-start; gap: .5rem;
  padding: .55rem .75rem;
  background: #fffbeb; border: 1px solid #fde68a; border-radius: var(--radius);
  color: #78350f; font-weight: var(--fw-light); line-height: 1.5;
}
.modal-pitfalls li i { color: #d97706; font-size: 1.2rem; margin-top: .1rem; flex-shrink: 0; }

.modal-actions {
  display: flex; gap: .65rem; justify-content: flex-end;
  padding: 1rem 1.75rem 1.5rem;
  flex-wrap: wrap;
}
</style>
</head>

<body>
<div class="shell">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="brand">
      <i class="ph-duotone ph-stack"></i>
      <span>Meta-Framework Karar Sihirbazı</span>
    </div>
    <div class="progress" id="progress"></div>
    <button class="btn btn-ghost" id="btn-reset">
      <i class="ph ph-arrow-counter-clockwise"></i> Sıfırla
    </button>
  </div>

  <!-- Senaryo Kartları (JSON-content, tıkla → modal aç) -->
  <section id="scenarios-section">
    <div class="scenarios-head">
      <div>
        <h3><i class="ph-duotone ph-files"></i> Hazır Senaryolar</h3>
        <p class="meta">Birbirinden farklı 8 proje profili. Karta tıkla → detayları gör → "Uygula" ile Kanban'a yansıt.</p>
      </div>
    </div>
    <div class="scenarios-grid" id="scenarios-grid"></div>
  </section>

  <!-- İki Sütun Düzen -->
  <div class="layout" id="layout">
    <!-- Sol: Koşullu Form -->
    <section id="form-area" class="card"></section>

    <!-- Sağ: Canlı Kanban -->
    <aside class="kanban">
      <div class="kanban-head">
        <i class="ph-duotone ph-kanban" style="font-size: 1.5rem; color: var(--c-primary);"></i>
        <h3>Canlı Mimari Önerisi</h3>
        <span class="meta" id="kanban-meta">0 kart</span>
      </div>
      <div class="kanban-board" id="kanban-board"></div>
    </aside>
  </div>

</div>

<!-- Senaryo Detay Modal -->
<div id="scenario-modal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-content" role="dialog" aria-modal="true">
    <div id="scenario-modal-body"></div>
  </div>
</div>

<script src="./dist/app.js" defer></script>

</body>
</html>
