<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meta-Framework Karar Sihirbazı — Koşullu Form → Kanban</title>

<!-- Roboto (kullanıcı kuralı: min weight 300) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />

<!-- Phosphor Icons (kullanıcı kuralı: phosphor öncelik) -->
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

<!-- Tailwind + Flowbite -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />

<style>
/* SCSS-derlenmiş gibi düşünülecek CSS — Roboto, 1rem taban, custom pill renkleri */
:root {
  --ff-base: 'Roboto', system-ui, sans-serif;
  --fs-base: 1rem;          /* MIN 1rem — kullanıcı kuralı */
  --fs-sm:   1rem;          /* min 1rem korunur, sm farkı sadece weight ile */
  --fs-lg:   1.125rem;
  --fs-xl:   1.375rem;
  --fs-2xl:  1.75rem;
  --fs-3xl:  2.25rem;
  --fw-light: 300;
  --fw-reg:   400;
  --fw-med:   500;
  --fw-bold:  700;

  --c-bg:           #f8fafc;
  --c-surface:      #ffffff;
  --c-border:       #e2e8f0;
  --c-text:         #0f172a;
  --c-text-muted:   #475569;
  --c-primary:      #4f46e5;
  --c-primary-soft: #eef2ff;
  --c-success:      #059669;
  --c-warning:      #d97706;
  --c-danger:       #dc2626;

  /* Sütun renk tokenları (Kanban kategorileri) */
  --col-kernel:     #7c3aed;  /* mor — DDD kernel */
  --col-stack:      #dc2626;  /* kırmızı — tahtadaki tech stack rengi */
  --col-saas:       #059669;  /* yeşil — saas apps */
  --col-module:     #2563eb;  /* mavi — system modules */
  --col-plugin:     #ea580c;  /* turuncu — plugins */
  --col-extension:  #0891b2;  /* cyan — extensions/snippets */
  --col-paradigm:   #be185d;  /* fuşya — mimari paradigmalar */

  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 14px;
  --shadow-1: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
  --shadow-2: 0 4px 12px rgba(15,23,42,.06), 0 2px 4px rgba(15,23,42,.04);
}

* { box-sizing: border-box; }
html, body {
  font-family: var(--ff-base);
  font-size: var(--fs-base);
  font-weight: var(--fw-reg);
  color: var(--c-text);
  background: var(--c-bg);
  margin: 0;
}
/* Tailwind body resetini kullanıcı kuralıyla geçersiz kıl */
body { font-size: 1rem !important; line-height: 1.55; }

/* Hiçbir öğe 1rem altına düşmesin */
.pill, .meta, .hint, .step-num, button, input, label, small, .text-xs, .text-sm {
  font-size: 1rem !important;
}

/* Düzen */
.shell {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 4rem;
}
.topbar {
  display: flex; gap: 1rem; align-items: center; justify-content: space-between;
  padding: 1rem 1.25rem;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
  margin-bottom: 1.5rem;
}
.brand {
  display: flex; align-items: center; gap: .75rem;
  font-weight: var(--fw-med);
  font-size: var(--fs-lg);
}
.brand i { color: var(--c-primary); font-size: 1.75rem; }

/* İlerleme barı */
.progress {
  display: flex; gap: .5rem; flex-wrap: wrap; align-items: center;
}
.progress .dot {
  width: 1.5rem; height: 1.5rem; border-radius: 50%;
  border: 2px solid var(--c-border);
  background: var(--c-surface);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: .85rem !important;   /* sadece dot içi — istisna */
  color: var(--c-text-muted);
  font-weight: var(--fw-med);
}
.progress .dot.done { background: var(--c-primary); border-color: var(--c-primary); color: #fff; }
.progress .dot.current { border-color: var(--c-primary); color: var(--c-primary); font-weight: var(--fw-bold); }

.layout {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.4fr);
  gap: 1.5rem;
}
@media (max-width: 1100px) {
  .layout { grid-template-columns: 1fr; }
}

/* Form Kartı */
.card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
  padding: 1.5rem;
}
.card-header {
  margin-bottom: 1.25rem;
  display: flex; gap: 1rem; align-items: flex-start; justify-content: space-between;
}
.card-header h2 {
  margin: 0 0 .25rem 0;
  font-size: var(--fs-xl);
  font-weight: var(--fw-med);
  color: var(--c-text);
}
.card-header p {
  margin: 0;
  color: var(--c-text-muted);
  font-weight: var(--fw-light);
}
.step-num {
  background: var(--c-primary-soft);
  color: var(--c-primary);
  padding: .35rem .65rem;
  border-radius: 999px;
  font-weight: var(--fw-med);
  white-space: nowrap;
}

/* Option grid (multi-conditional form alanları) */
.options {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: .75rem;
}
.option {
  border: 1.5px solid var(--c-border);
  background: #fff;
  padding: 1rem 1.1rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .15s ease;
  display: flex; flex-direction: column; gap: .55rem;
  text-align: left;
  font: inherit;
}
.option:hover { border-color: var(--c-primary); box-shadow: var(--shadow-2); transform: translateY(-1px); }
.option.selected {
  border-color: var(--c-primary);
  background: var(--c-primary-soft);
  outline: 3px solid rgba(79,70,229,.12);
}
.option-head {
  display: flex; align-items: center; gap: .55rem;
  font-weight: var(--fw-med);
}
.option-head i { font-size: 1.4rem; color: var(--c-primary); }
.option-desc { color: var(--c-text-muted); font-weight: var(--fw-light); }
.option-pills { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .25rem; }

/* Pill / Tag / Balloon — gerekçe baloncukları */
.pill {
  display: inline-flex; align-items: center; gap: .3rem;
  padding: .25rem .6rem;
  border-radius: 999px;
  font-weight: var(--fw-med);
  background: #f1f5f9;
  color: #334155;
  border: 1px solid #e2e8f0;
  white-space: nowrap;
}
.pill i { font-size: 1.05rem; }
.pill.pill-why    { background: #fef3c7; color: #92400e; border-color: #fde68a; }
.pill.pill-must   { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
.pill.pill-should { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
.pill.pill-could  { background: #e0f2fe; color: #075985; border-color: #bae6fd; }
.pill.pill-effort { background: #ecfccb; color: #3f6212; border-color: #d9f99d; }
.pill.pill-license{ background: #f3e8ff; color: #6b21a8; border-color: #e9d5ff; }
.pill.pill-paradigm{ background: #fce7f3; color: #9d174d; border-color: #fbcfe8; }

/* Form altı navigasyon */
.nav-row {
  display: flex; gap: .75rem; justify-content: space-between;
  margin-top: 1.25rem;
}
.btn {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .65rem 1.1rem;
  border-radius: var(--radius);
  border: 1.5px solid var(--c-border);
  background: #fff;
  color: var(--c-text);
  cursor: pointer;
  font: inherit;
  font-weight: var(--fw-med);
  transition: all .15s ease;
}
.btn:hover { border-color: var(--c-primary); color: var(--c-primary); }
.btn-primary { background: var(--c-primary); border-color: var(--c-primary); color: #fff; }
.btn-primary:hover { background: #4338ca; border-color: #4338ca; color: #fff; }
.btn-ghost   { border-color: transparent; }
.btn[disabled] { opacity: .4; cursor: not-allowed; }

/* Kanban Önizleme / Sonuç */
.kanban {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
  padding: 1.25rem;
  height: fit-content;
  position: sticky;
  top: 1rem;
}
.kanban-head {
  display: flex; align-items: center; gap: .65rem;
  margin-bottom: 1rem;
}
.kanban-head h3 { margin: 0; font-weight: var(--fw-med); font-size: var(--fs-lg); }
.kanban-head .meta { color: var(--c-text-muted); font-weight: var(--fw-light); margin-left: auto; }
.kanban-board {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: .75rem;
}
.column {
  background: #f8fafc;
  border-radius: var(--radius);
  padding: .75rem;
  border-top: 4px solid var(--col-kernel);
  min-height: 120px;
}
.column[data-col="kernel"]    { border-top-color: var(--col-kernel); }
.column[data-col="stack"]     { border-top-color: var(--col-stack); }
.column[data-col="saas"]      { border-top-color: var(--col-saas); }
.column[data-col="module"]    { border-top-color: var(--col-module); }
.column[data-col="plugin"]    { border-top-color: var(--col-plugin); }
.column[data-col="extension"] { border-top-color: var(--col-extension); }
.column[data-col="paradigm"]  { border-top-color: var(--col-paradigm); }

.column-head {
  display: flex; align-items: center; gap: .45rem;
  margin-bottom: .65rem;
  font-weight: var(--fw-med);
}
.column-head .count {
  margin-left: auto;
  background: #fff; color: var(--c-text-muted);
  padding: 0 .55rem; border-radius: 999px;
  border: 1px solid var(--c-border);
}
.col-icon { width: 1.5rem; height: 1.5rem; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; color: #fff; }
.column[data-col="kernel"]    .col-icon { background: var(--col-kernel); }
.column[data-col="stack"]     .col-icon { background: var(--col-stack); }
.column[data-col="saas"]      .col-icon { background: var(--col-saas); }
.column[data-col="module"]    .col-icon { background: var(--col-module); }
.column[data-col="plugin"]    .col-icon { background: var(--col-plugin); }
.column[data-col="extension"] .col-icon { background: var(--col-extension); }
.column[data-col="paradigm"]  .col-icon { background: var(--col-paradigm); }

.kcard {
  background: #fff;
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  padding: .65rem .75rem;
  display: flex; flex-direction: column; gap: .4rem;
  margin-bottom: .5rem;
  box-shadow: var(--shadow-1);
}
.kcard-title { display: flex; align-items: center; gap: .4rem; font-weight: var(--fw-med); }
.kcard-title i { color: var(--c-primary); }
.kcard-desc { color: var(--c-text-muted); font-weight: var(--fw-light); }
.kcard-pills { display: flex; flex-wrap: wrap; gap: .25rem; }
.empty {
  text-align: center; color: var(--c-text-muted); font-weight: var(--fw-light);
  padding: .65rem; border: 1.5px dashed var(--c-border); border-radius: var(--radius-sm);
  background: #fff;
}

/* Final Mode */
.final-banner {
  background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
  color: #fff;
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 1rem;
}
.final-banner i { font-size: 2.5rem; }
.final-banner h2 { margin: 0; font-weight: var(--fw-med); font-size: var(--fs-2xl); }
.final-banner p { margin: 0; font-weight: var(--fw-light); opacity: .92; }

/* Cevap özeti */
.summary {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}
.summary-row { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; padding: .25rem 0; }
.summary-row strong { font-weight: var(--fw-med); min-width: 12rem; }

/* Tooltip (gerekçe baloncuğu) */
[data-tip] { position: relative; cursor: help; }
[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + .35rem); left: 50%;
  transform: translateX(-50%);
  background: #0f172a; color: #fff;
  padding: .5rem .75rem; border-radius: 6px;
  white-space: pre-wrap; max-width: 280px; width: max-content;
  font-weight: var(--fw-light);
  z-index: 50;
  box-shadow: var(--shadow-2);
}

/* AI Explain bölümü */
.ai-box {
  background: #f0f9ff;
  border: 1px solid #bae6fd;
  border-radius: var(--radius);
  padding: .85rem 1rem;
  margin-top: 1rem;
  font-weight: var(--fw-light);
  display: none;
}
.ai-box.show { display: block; }
.ai-box .ai-head { display: flex; align-items: center; gap: .5rem; font-weight: var(--fw-med); margin-bottom: .35rem; color: #0369a1; }
</style>
</head>

<body>
<div class="shell">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="brand">
      <i class="ph-duotone ph-stack"></i>
      <span>Meta-Framework Karar Sihirbazı</span>
    </div>
    <div class="progress" id="progress"></div>
    <button class="btn btn-ghost" onclick="App.reset()">
      <i class="ph ph-arrow-counter-clockwise"></i> Sıfırla
    </button>
  </div>

  <!-- İki Sütun Düzen -->
  <div class="layout">
    <!-- Sol: Koşullu Form -->
    <section id="form-area" class="card"></section>

    <!-- Sağ: Canlı Kanban -->
    <aside class="kanban">
      <div class="kanban-head">
        <i class="ph-duotone ph-kanban" style="font-size: 1.5rem; color: var(--c-primary);"></i>
        <h3>Canlı Mimari Önerisi</h3>
        <span class="meta" id="kanban-meta">0 kart</span>
      </div>
      <div class="kanban-board" id="kanban-board"></div>
    </aside>
  </div>

</div>

<script>
/* ============================================================
   DECISION DATA — Beyaz tahtadaki sütunlardan + araştırmadan
   ============================================================ */

const COLUMNS = [
  { id: 'paradigm',  title: 'Mimari Paradigmalar',     icon: 'ph-tree-structure'   },
  { id: 'kernel',    title: 'KERNEL (Çekirdek)',       icon: 'ph-cpu'              },
  { id: 'stack',     title: 'Back/Front Tech Stack',    icon: 'ph-stack-simple'    },
  { id: 'saas',      title: 'SaaS Apps',                icon: 'ph-buildings'       },
  { id: 'module',    title: 'System Modules',           icon: 'ph-puzzle-piece'    },
  { id: 'plugin',    title: 'Plugins',                  icon: 'ph-plug'            },
  { id: 'extension', title: 'Extensions / Snippets',    icon: 'ph-magic-wand'      },
];

const STEPS = [
  {
    id: 'domain', title: 'Projenin kapsamı ne?',
    subtitle: 'Hangi tip platform inşa ediyorsun? (DDD bağlamında "core domain" tanımı buradan başlar)',
    options: [
      { id: 'suite',     label: 'Çok-amaçlı SaaS Suite', icon: 'ph-buildings',
        desc: 'CRM + ERP + CMS + Commerce — Frappe / Odoo seviyesi geniş kapsam',
        rationale: 'Modüler monolit + plugin mimarisi gerekir' },
      { id: 'commerce',  label: 'Headless Commerce',     icon: 'ph-shopping-cart',
        desc: 'Medusa / Saleor tarzı ticari çekirdek, çoklu storefront',
        rationale: 'Stock, attribute/variant, coupon, BOGO modülleri kritik' },
      { id: 'cms',       label: 'İçerik Odaklı CMS',     icon: 'ph-newspaper',
        desc: 'Drupal / Strapi tarzı, içerik + taxonomy + layout builder ön planda',
        rationale: 'Content + Layout Builder + i18n birincil' },
      { id: 'internal',  label: 'Internal Tool / Admin', icon: 'ph-toolbox',
        desc: 'Retool / NocoBase tarzı dahili operasyon paneli',
        rationale: 'Auth + CRUD + table/form + hızlı view inşası' },
      { id: 'meta',      label: 'Meta-Framework Kendisi', icon: 'ph-stack',
        desc: 'Bu projenin asıl hedefi — başkalarına framework satıyorsun',
        rationale: 'Kernel + DX araçları + plugin SDK öncelikli' },
    ],
  },
  {
    id: 'tenancy', title: 'Tenant modeli?',
    subtitle: 'Tek müşteri mi, çoklu müşteri mi servis edeceksin?',
    options: [
      { id: 'single',         label: 'Single-tenant',          icon: 'ph-user',         desc: 'Tek kurulum, tek müşteri', rationale: 'RBAC yeterli, ABAC opsiyonel' },
      { id: 'multi-shared',   label: 'Multi-tenant (shared DB)', icon: 'ph-users-three',  desc: 'Tek DB, row-level security', rationale: 'ABAC + tenant_id zorunlu' },
      { id: 'multi-isolated', label: 'Multi-tenant (isolated)', icon: 'ph-users-four',    desc: 'Müşteri başına ayrı schema/DB', rationale: 'Migration orkestrasyonu + tenant provisioning' },
      { id: 'white-label',    label: 'White-label çoklu marka', icon: 'ph-palette',       desc: 'Theme/brand izolasyonlu multi-tenant', rationale: 'Tenant + Theme katmanı + asset isolation' },
    ],
  },
  {
    id: 'ai', title: 'AI rolü?',
    subtitle: 'AI-first mi yoksa opsiyonel mi? (Beyaz tahta: "AI Provider", "Agents")',
    options: [
      { id: 'agent-first', label: 'AI-First / Agents',   icon: 'ph-robot',           desc: 'Otonom agentlar iş akışı yürütür',
        rationale: 'AI Provider abstraction + Agent runtime + tool calling şart' },
      { id: 'copilot',     label: 'AI-Assist / Copilot', icon: 'ph-magic-wand',      desc: 'Kullanıcıya öneriler, autocomplete',
        rationale: 'AI Provider + embedding/vector search yeterli' },
      { id: 'optional',    label: 'Opsiyonel / Future',  icon: 'ph-sparkle',         desc: 'Şimdilik yok, sonra eklenecek',
        rationale: 'Hook noktaları bırak, kernel zorla yükleme yapmasın' },
      { id: 'none',        label: 'AI yok',              icon: 'ph-x-circle',        desc: 'Bu projede AI bileşeni planlanmıyor',
        rationale: 'AI modüllerini kernel\'a dahil etme' },
    ],
  },
  {
    id: 'data', title: 'Veri yapısı dominansı?',
    subtitle: 'PostgreSQL + CouchDB + Elastic kombinasyonu için (kırmızı: tahtadaki öncelik)',
    options: [
      { id: 'relational',   label: 'İlişkisel ağırlıklı',     icon: 'ph-database',          desc: 'Strict schema, FK, transaction önemli',
        rationale: 'PostgreSQL birincil, Prisma ORM' },
      { id: 'mixed',        label: 'Karma (SQL + Document)',  icon: 'ph-database',          desc: 'Yapısal veri + esnek attribute/variant',
        rationale: 'Postgres + JSONB veya Postgres + CouchDB hybrid' },
      { id: 'document',     label: 'Çoğunlukla Document',     icon: 'ph-files',             desc: 'Şema sık değişir, attribute fırtınası',
        rationale: 'CouchDB birincil, replication friendly' },
      { id: 'event-source', label: 'Event-sourced',           icon: 'ph-arrows-clockwise',  desc: 'Audit trail, geri alma, time-travel',
        rationale: 'Event Store + CQRS read modelleri' },
    ],
  },
  {
    id: 'search', title: 'Arama karmaşıklığı?',
    subtitle: 'Elastic\'ı (tahtadaki Couch → Elastic akışı) ne zaman koymalı?',
    options: [
      { id: 'basic',   label: 'Basit (SQL LIKE)',         icon: 'ph-magnifying-glass',         desc: 'Birkaç bin satır, basit eşleşme',
        rationale: 'Postgres FTS yeterli' },
      { id: 'faceted', label: 'Facet + Filter',           icon: 'ph-funnel',                   desc: 'E-ticaret tipi filtreleme',
        rationale: 'Postgres FTS + GIN index veya Meilisearch' },
      { id: 'fulltext',label: 'Tam metin (büyük corpus)', icon: 'ph-magnifying-glass-plus',    desc: 'Milyon kayıt, fuzzy, autocomplete',
        rationale: 'Elasticsearch / OpenSearch' },
      { id: 'hybrid',  label: 'Hybrid (BM25 + Vector)',   icon: 'ph-graph',                    desc: 'AI semantic + klasik arama',
        rationale: 'Elastic + pgvector veya Qdrant' },
    ],
  },
  {
    id: 'realtime', title: 'Real-time ihtiyacı?',
    subtitle: 'Notification, collaboration, streaming dashboard...',
    options: [
      { id: 'none',   label: 'Yok / sadece request-response', icon: 'ph-arrow-line-right', desc: 'Klasik REST/GraphQL akışı',

      { id: 'notif',  label: 'Sadece bildirim',               icon: 'ph-bell',             desc: 'Toast, alert, push notif',
        rationale: 'Notification modülü + SSE veya WebSocket' },
      { id: 'collab', label: 'Live collaboration',            icon: 'ph-users',            desc: 'Google Docs benzeri eş zamanlı',
        rationale: 'Y.js / CRDT + Hocuspocus tarzı sync server' },
      { id: 'stream', label: 'Streaming dashboards',          icon: 'ph-chart-line-up',    desc: 'Power BI / metric ekranları (tahta: Power BI/metric)',
        rationale: 'Time-series DB + WebSocket fan-out' },
    ],
  },
  {
    id: 'mobile', title: 'Mobil hedef?',
    subtitle: 'Tahtada "React Native" + "Adaptive break points" var',

  { id:'e-cli',      column:'extension', title:'CLI Scaffolder',       icon:'ph-terminal',       desc:'`mf gen module foo` tarzı kod jeneratörü.', why:'Vibecoding DX', priority:'must', effort:'M', conditions:{ vibe:['critical','important'] } },
  { id:'e-vsc',      column:'extension', title:'VS Code Extension',    icon:'ph-file-code',      desc:'Schema/route IntelliSense + sihirbazlar.', why:'DX', priority:'should', effort:'L', conditions:{ vibe:['critical','important'] } },
  { id:'e-doctype',  column:'extension', title:'Doctype Designer',     icon:'ph-table',          desc:'Frappe Doctype benzeri — tıklayarak entity tanımı.', why:'No-code core', priority:'must', effort:'L', conditions:{ vibe:['critical','important'] } },
  { id:'e-view',     column:'extension', title:'View Designer',        icon:'ph-eye',            desc:'Drupal Views benzeri — tıklayarak liste/grafik üretimi.', why:'No-code report', priority:'must', effort:'L', conditions:{ vibe:['critical','important'] } },
  { id:'e-mit',      column:'extension', title:'MIT + Managed Edition',icon:'ph-cloud-check',    desc:'Açık kaynak + hosted ticari edisyon.', why:'Lisans modeli', priority:'must', effort:'L', conditions:{ license:['mit-hosted'] } },
  { id:'e-mit-ent',  column:'extension', title:'Open Core (Enterprise)', icon:'ph-buildings-skyline', desc:'MIT kernel + ticari enterprise modüller.', why:'Lisans modeli', priority:'must', effort:'L', conditions:{ license:['mit-enterprise'] } },
];

/* ============================================================
   ENGINE — state, kural değerlendirme, render
   ============================================================ */

const App = (() => {
  const state = {
    currentStep: 0,
    answers: {},   // { stepId: optionId }
  };

  const $ = (sel) => document.querySelector(sel);

  function isComplete() { return state.currentStep >= STEPS.length; }

  function answer(stepId, optionId) {
    state.answers[stepId] = optionId;
    if (state.currentStep < STEPS.length) state.currentStep++;
    render();
  }
  function back() {
    if (state.currentStep > 0) {
      state.currentStep--;
      const stepId = STEPS[state.currentStep].id;
      delete state.answers[stepId];
      render();
    }
  }
  function reset() {
    state.currentStep = 0;
    state.answers = {};
    render();
  }

  // OR within key, AND across keys
  function conditionsMatch(conditions, answers) {
    if (!conditions || Object.keys(conditions).length === 0) return true;
    return Object.entries(conditions).every(([stepId, allowed]) => {
      const a = answers[stepId];
      if (!a) return false;
      return allowed.includes(a);
    });
  }

  function evaluate() {
    return RECS.filter(r => conditionsMatch(r.conditions, state.answers));
  }

  function priorityRank(p) { return ({must:0, should:1, could:2})[p] ?? 9; }
  function effortRank(e)   { return ({XS:0, S:1, M:2, L:3})[e] ?? 9; }

  function renderProgress() {
    const el = $('#progress');
    el.innerHTML = STEPS.map((s, i) => {
      const cls = i < state.currentStep ? 'done' : (i === state.currentStep ? 'current' : '');
      return `<span class="dot ${cls}" data-tip="${escape(s.title)}">${i+1}</span>`;
    }).join('');
  }

  function renderForm() {
    const el = $('#form-area');
    if (isComplete()) {
      el.innerHTML = renderFinal();
      return;
    }
    const step = STEPS[state.currentStep];
    el.innerHTML = `
      <div class="card-header">
        <div>
          <h2>${escape(step.title)}</h2>
          <p>${escape(step.subtitle || '')}</p>
        </div>
        <span class="step-num">Adım ${state.currentStep+1} / ${STEPS.length}</span>
      </div>
      <div class="options">
        ${step.options.map(opt => `
          <button class="option" onclick="App.choose('${step.id}','${opt.id}')">
            <span class="option-head"><i class="ph-duotone ${opt.icon}"></i>${escape(opt.label)}</span>
            <span class="option-desc">${escape(opt.desc)}</span>
            <span class="option-pills">
              <span class="pill pill-why" data-tip="Bu seçim Kanban'da hangi kartları tetikleyecek?">
                <i class="ph ph-info"></i> ${escape(opt.rationale)}
              </span>
            </span>
          </button>
        `).join('')}
      </div>
      <div class="nav-row">
        <button class="btn" onclick="App.back()" ${state.currentStep===0?'disabled':''}>
          <i class="ph ph-arrow-left"></i> Geri
        </button>
        <span class="meta" style="align-self:center; color: var(--c-text-muted);">
          Bir seçenek seçerek otomatik ilerle
        </span>
      </div>
    `;
  }

  function renderFinal() {
    const ans = STEPS.map(s => {
      const opt = s.options.find(o => o.id === state.answers[s.id]);
      return `
        <div class="summary-row">
          <strong>${escape(s.title)}</strong>
          <span class="pill"><i class="ph-duotone ${opt.icon}"></i> ${escape(opt.label)}</span>
        </div>
      `;
    }).join('');
    return `
      <div class="final-banner">
        <i class="ph-duotone ph-check-circle"></i>
        <div>
          <h2>Tüm cevaplar alındı</h2>
          <p>Aşağıda seçim özetin var. Sağdaki Kanban senin mimari önerin.</p>
        </div>
      </div>
      <div class="summary">${ans}</div>
      <div class="nav-row">
        <button class="btn" onclick="App.back()"><i class="ph ph-arrow-left"></i> Son seçimi düzenle</button>
        <button class="btn btn-primary" onclick="App.askAI()"><i class="ph ph-sparkle"></i> AI gerekçesini açıkla</button>
      </div>
      <div class="ai-box" id="ai-box">
        <div class="ai-head"><i class="ph-duotone ph-brain"></i> AI Gerekçesi (mock)</div>
        <div id="ai-text"></div>
      </div>
    `;
  }

  function renderKanban() {
    const recs = evaluate();
    $('#kanban-meta').textContent = `${recs.length} kart · ${Object.keys(state.answers).length}/${STEPS.length} cevap`;

    const grouped = {};
    COLUMNS.forEach(c => grouped[c.id] = []);
    recs.forEach(r => grouped[r.column]?.push(r));

    // sırala
    Object.values(grouped).forEach(arr => arr.sort((a,b) => {
      const dp = priorityRank(a.priority) - priorityRank(b.priority);
      if (dp !== 0) return dp;
      return effortRank(a.effort) - effortRank(b.effort);
    }));

    $('#kanban-board').innerHTML = COLUMNS.map(col => `
      <div class="column" data-col="${col.id}">
        <div class="column-head">
          <span class="col-icon"><i class="ph ${col.icon}"></i></span>
          ${escape(col.title)}
          <span class="count">${grouped[col.id].length}</span>
        </div>
        ${grouped[col.id].length === 0
          ? `<div class="empty">— öneri yok —</div>`
          : grouped[col.id].map(renderCard).join('')}
      </div>
    `).join('');
  }

  function renderCard(r) {
    return `
      <div class="kcard">
        <div class="kcard-title"><i class="ph-duotone ${r.icon}"></i> ${escape(r.title)}</div>
        <div class="kcard-desc">${escape(r.desc)}</div>
        <div class="kcard-pills">
          <span class="pill pill-${r.priority}" data-tip="Öncelik: ${r.priority.toUpperCase()}">
            <i class="ph-fill ph-circle"></i> ${r.priority.toUpperCase()}
          </span>
          <span class="pill pill-effort" data-tip="Tahmini efor (XS/S/M/L)">
            <i class="ph ph-gauge"></i> ${escape(r.effort)}
          </span>
          ${r.why ? `<span class="pill pill-why" data-tip="Bu kartı tetikleyen seçim gerekçesi">
            <i class="ph ph-info"></i> ${escape(r.why)}
          </span>` : ''}
          ${r.license ? `<span class="pill pill-license" data-tip="Lisans/yaklaşım">
            <i class="ph ph-scales"></i> ${escape(r.license)}
          </span>` : ''}
        </div>
      </div>
    `;
  }

  function escape(s) {
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function askAI() {
    const box = document.getElementById('ai-box');
    const text = document.getElementById('ai-text');
    box.classList.add('show');
    // Mock streaming response (FastAPI /ai/explain entegrasyonu hazır olduğunda gerçek SSE)
    const recs = evaluate();
    const summary = [
      `Seçtiklerin ${recs.length} öneriyi tetikledi.`,
      ``,
      `Mimari paradigmalar: ${recs.filter(r=>r.column==='paradigm').map(r=>r.title).join(', ') || '—'}.`,
      ``,
      `Stack kararının özü: ${recs.filter(r=>r.column==='stack').slice(0,3).map(r=>r.title).join(' + ')}.`,
      ``,
      `Kritik kernel parçaları: ${recs.filter(r=>r.column==='kernel' && r.priority==='must').map(r=>r.title).join(', ')}.`,
      ``,
      `Sıralama önerisi: önce paradigma + kernel temeli → sonra system modules → en son plugins/extensions.`,
      ``,
      `(Bu metin mock. Gerçek motorda FastAPI /ai/explain endpoint'i SSE stream döndürür.)`
    ].join('\n');
    text.textContent = '';
    let i = 0;
    const stream = setInterval(() => {
      text.textContent = summary.slice(0, i);
      i += 6;
      if (i > summary.length) clearInterval(stream);
    }, 12);
  }

  function render() {
    renderProgress();
    renderForm();
    renderKanban();
  }

  // expose
  return {
    choose: (stepId, optionId) => answer(stepId, optionId),
    back, reset, askAI,
    _state: state, _evaluate: evaluate,
  };
})();

window.App = App;
document.addEventListener('DOMContentLoaded', () => {
  // ilk render
  App.choose && (function(){ /* no-op, just ensure init */ })();
  // ilk yükleme zaten DOMContentLoaded öncesi App'i kullanmıyor; manuel tetikle
  App.reset();
});
</script>

</body>
</html>
