<!DOCTYPE html>

<head>

<title>404 — Sayfa Bulunamadı · Meta-Framework Karar Sihirbazı</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  :root { font-size: 1rem; }
  html, body { margin: 0; padding: 0; font-family: 'Roboto', system-ui, sans-serif; font-weight: 300; background: #f8fafc; color: #0f172a; min-height: 100vh; }
  body { display: flex; align-items: center; justify-content: center; padding: 2rem; font-size: 1rem; line-height: 1.55; }
  .wrap { max-width: 560px; text-align: center; background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 2.5rem 2rem; box-shadow: 0 4px 12px rgba(15,23,42,.06); }

  p { color: #475569; font-weight: 300; margin: .5rem 0 1.5rem; font-size: 1rem; }
  a.btn { display: inline-flex; align-items: center; gap: .5rem; padding: .65rem 1.1rem; background: #4f46e5; color: #fff; border-radius: 10px; text-decoration: none; font-weight: 500; font-size: 1rem; }
  a.btn:hover { background: #4338ca; }
</style>
</head>
<body>
<div class="wrap">
  <i class="ph-duotone ph-compass"></i>
  <h1>Sayfa bulunamadı</h1>
